services:
  app:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* são baked-in em build time — não altere sem rebuild
        # Lido do arquivo .env na raiz do projeto (copie .env.example → .env)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3001/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
